<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة خاصة</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; background: #fdfdfd;
            color: #333; font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .container {
            text-align: center; padding: 20px; max-width: 90%;
        }
        .card-img {
            width: 100%; max-width: 350px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .text-box {
            background: #fff; padding: 20px; border-radius: 10px;
            border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 { color: #d35400; margin: 0 0 10px 0; font-size: 1.5rem; }
        p { font-size: 1.1rem; line-height: 1.6; color: #555; margin-bottom: 5px; }
        .signature { font-weight: bold; color: #2c3e50; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/LzdYp0R/1000424114.jpg" class="card-img" alt="معايدة">
        
        <div class="text-box">
            <h2>عيد مبارك ✨</h2>
            <p>أتمنى لك عيداً سعيداً، وكل عام وأنت بألف خير وصحة وسلامة</p>
            <span class="signature">من: أمير</span>
        </div>
    </div>

</body>
</html>
