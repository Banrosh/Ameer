<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh; background: #050505;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
        }
        .container {
            text-align: center; padding: 50px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        h1 { 
            font-size: 3rem; 
            color: #f39c12; 
            margin-bottom: 10px;
        }
        p { font-size: 1.3rem; color: #ccc; }
        .btn {
            margin-top: 30px; padding: 12px 40px; font-size: 1.1rem;
            background: transparent; color: #f39c12; border: 1px solid #f39c12;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #f39c12; color: #000; }
        
        /* تأثير هادئ جداً بالخلفية */
        .dot { position: absolute; background: rgba(243, 156, 18, 0.2); border-radius: 50%; animation: move linear infinite; }
        @keyframes move { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>عيد مبارك ✨</h1>
        <p>كل عام وأنت بألف خير</p>
        <button class="btn" onclick="showMsg()">إضغط هنا</button>
    </div>

    <script>
        function showMsg() {
            alert("أتمنى لك عيداً سعيداً، وكل عام وأنت بألف خير وصحة وسلامة.");
        }

        function createDot() {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.width = '2px';
            dot.style.height = '2px';
            dot.style.animationDuration = Math.random() * 5 + 5 + 's';
            document.body.appendChild(dot);
            setTimeout(() => dot.remove(), 10000);
        }
        setInterval(createDot, 500);
    </script>

</body>
</html>
